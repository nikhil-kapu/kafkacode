<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1222"/>
      <stop offset="1" stop-color="#161f38"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb020"/>
      <stop offset="1" stop-color="#ff5a1f"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="8" fill="url(#accent)"/>
  <rect x="0" y="632" width="1280" height="8" fill="url(#accent)"/>

  <!-- logo is composited here as a raster overlay (center, y≈96) -->

  <text x="640" y="392" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="bold" fill="#ffffff" letter-spacing="-2">KafkaCode</text>

  <text x="640" y="452" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="bold" fill="#ff8a3d">AI-powered privacy &amp; compliance scanner</text>

  <text x="640" y="506" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="25" fill="#9aa4b2">Find PII leaks, hardcoded secrets &amp; compliance risks — before they ship.</text>

  <text x="640" y="592" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#6b7689">github.com/nikhil-kapu/kafkacode</text>
</svg>
